# Azure Container Apps deployment configuration
# This file can be used with Azure CLI or GitHub Actions

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kids-bible-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kids-bible-backend
  template:
    metadata:
      labels:
        app: kids-bible-backend
    spec:
      containers:
      - name: backend
        image: <your-registry>.azurecr.io/kids-bible-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kids-bible-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: kids-bible-secrets
              key: secret-key
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kids-bible-backend-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: kids-bible-backend
